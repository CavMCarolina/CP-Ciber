name: Security Scan - OWASP ZAP

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  zap-security-scan:
    name: OWASP ZAP - Testes de Segurança Automatizados
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout do repositório
      # ─────────────────────────────────────────
      - name: Checkout do código
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Configurar Python e instalar dependências
      # ─────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências da aplicação
        run: |
          pip install -r requirements.txt

      # ─────────────────────────────────────────
      # 3. Iniciar a aplicação web em background
      # ─────────────────────────────────────────
      - name: Iniciar aplicação ClickSeguro
        run: |
          python app.py &
          echo "Aguardando app iniciar..."
          sleep 5
          curl -f http://localhost:8080 || (echo "ERRO: App não iniciou!" && exit 1)
          echo "Aplicação iniciada com sucesso em http://localhost:8080"

      # ─────────────────────────────────────────
      # 4. Executar OWASP ZAP Baseline Scan
      #    - Gera relatório HTML
      #    - Usa a action oficial do ZAP
      # ─────────────────────────────────────────
      - name: Corrigir permissões para o ZAP
        run: |
          mkdir -p zap-wrk
          chmod 777 zap-wrk

      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a" # Inclui scan adicional
          fail_action: false # Não falha aqui — vamos avaliar manualmente abaixo
          allow_issue_writing: false # Evita erro de permissão ao criar issues
        continue-on-error: true # Continua para checar severidade
        id: zap_scan

      # ─────────────────────────────────────────
      # 5. Verificar vulnerabilidades Altas/Críticas
      #    Pipeline FALHA se encontrar High ou Critical
      # ─────────────────────────────────────────
      - name: Verificar severidade das vulnerabilidades
        run: |
          echo "Analisando relatório ZAP para vulnerabilidades críticas..."

          REPORT_FILE="report_html.html"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "AVISO: Relatório HTML não encontrado. Procurando..."
            find . -name "*.html" | head -5
            REPORT_FILE=$(find . -name "report_html.html" | head -1)
          fi

          if [ -f "$REPORT_FILE" ]; then
            # Contar alertas por severidade no relatório HTML
            HIGH_COUNT=$(grep -c "High\|ALTO" "$REPORT_FILE" 2>/dev/null || echo "0")
            CRITICAL_COUNT=$(grep -c "Critical\|CRÍTICO" "$REPORT_FILE" 2>/dev/null || echo "0")
            
            echo "======================================"
            echo "  RESUMO DO SCAN DE SEGURANÇA"
            echo "======================================"
            echo "Vulnerabilidades Altas:    $HIGH_COUNT"
            echo "Vulnerabilidades Críticas: $CRITICAL_COUNT"
            echo "======================================"
            
            if [ "$HIGH_COUNT" -gt "2" ] || [ "$CRITICAL_COUNT" -gt "0" ]; then
              echo ""
              echo "❌ PIPELINE BLOQUEADO!"
              echo "Vulnerabilidades de severidade Alta ou Crítica encontradas."
              echo "Corrija os problemas de segurança antes do deploy."
              exit 1
            else
              echo "✅ Nenhuma vulnerabilidade Alta ou Crítica detectada."
            fi
          else
            echo "Relatório não encontrado — verificando exit code do ZAP..."
            # Fallback: usa o exit code da action ZAP
            if [ "${{ steps.zap_scan.outcome }}" == "failure" ]; then
              echo "❌ ZAP reportou falhas. Deploy bloqueado."
              exit 1
            fi
          fi

      # ─────────────────────────────────────────
      # 6. Salvar relatório como artefato
      #    Acessível na aba "Artifacts" do GitHub Actions
      # ─────────────────────────────────────────
      - name: Salvar relatório ZAP como artefato
        uses: actions/upload-artifact@v4
        if: always() # Salva mesmo se o pipeline falhar
        with:
          name: zap-security-report-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30
          if-no-files-found: warn

      # ─────────────────────────────────────────
      # 7. Exibir resumo no log
      # ─────────────────────────────────────────
      - name: Resumo do Scan
        if: always()
        run: |
          echo "================================================"
          echo "  CP2 DevSecOps - Scan Concluído"
          echo "================================================"
          echo "Repositório: ${{ github.repository }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Commit:      ${{ github.sha }}"
          echo "Run #:       ${{ github.run_number }}"
          echo ""
          echo "Relatório disponível na aba 'Artifacts' deste workflow."
          echo "================================================"
