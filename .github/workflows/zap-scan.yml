name: Security Scan - OWASP ZAP

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  zap-security-scan:
    name: OWASP ZAP - Testes de Segurança Automatizados
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout do repositório
      # ─────────────────────────────────────────
      - name: Checkout do código
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Configurar Python e instalar dependências
      # ─────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências da aplicação
        run: |
          pip install -r requirements.txt

      # ─────────────────────────────────────────
      # 3. Iniciar a aplicação web em background
      # ─────────────────────────────────────────
      - name: Iniciar aplicação ClickSeguro
        run: |
          python app.py &
          echo "Aguardando app iniciar..."
          sleep 5
          curl -f http://localhost:8080 || (echo "ERRO: App não iniciou!" && exit 1)
          echo "Aplicação iniciada com sucesso em http://localhost:8080"

      # ─────────────────────────────────────────
      # 4. Preparar diretório de relatórios
      # ─────────────────────────────────────────
      - name: Preparar diretório para relatórios
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports

      # ─────────────────────────────────────────
      # 5. Executar OWASP ZAP via Docker diretamente
      #    - Gera relatório HTML, JSON e MD
      #    - Usa --network=host para acessar localhost:8080
      # ─────────────────────────────────────────
      - name: Executar OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network=host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8080 \
              -r report_html.html \
              -J report_json.json \
              -w report_md.md \
              -a \
              -I
          echo "Scan concluído!"
        continue-on-error: true

      # ─────────────────────────────────────────
      # 6. Verificar vulnerabilidades Altas/Críticas
      #    Pipeline FALHA se encontrar High ou Critical
      # ─────────────────────────────────────────
      - name: Verificar severidade das vulnerabilidades
        run: |
          echo "Analisando relatório ZAP para vulnerabilidades críticas..."

          REPORT_FILE="zap-reports/report_html.html"

          if [ -f "$REPORT_FILE" ]; then
            HIGH_COUNT=$(grep -c "High" "$REPORT_FILE" 2>/dev/null || echo "0")
            CRITICAL_COUNT=$(grep -c "Critical" "$REPORT_FILE" 2>/dev/null || echo "0")

            echo "======================================"
            echo "  RESUMO DO SCAN DE SEGURANÇA"
            echo "======================================"
            echo "Vulnerabilidades Altas:    $HIGH_COUNT"
            echo "Vulnerabilidades Críticas: $CRITICAL_COUNT"
            echo "======================================"

            if [ "$HIGH_COUNT" -gt "2" ] || [ "$CRITICAL_COUNT" -gt "0" ]; then
              echo ""
              echo "PIPELINE BLOQUEADO!"
              echo "Vulnerabilidades de severidade Alta ou Crítica encontradas."
              echo "Corrija os problemas de segurança antes do deploy."
              exit 1
            else
              echo "Nenhuma vulnerabilidade Alta ou Crítica detectada."
            fi
          else
            echo "Relatório não encontrado em $REPORT_FILE"
            ls -la zap-reports/ || echo "Diretório vazio"
          fi

      # ─────────────────────────────────────────
      # 7. Salvar relatório como artefato
      #    Acessível na aba "Artifacts" do GitHub Actions
      # ─────────────────────────────────────────
      - name: Salvar relatório ZAP como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report-${{ github.run_number }}
          path: zap-reports/
          retention-days: 30
          if-no-files-found: warn

      # ─────────────────────────────────────────
      # 8. Exibir resumo no log
      # ─────────────────────────────────────────
      - name: Resumo do Scan
        if: always()
        run: |
          echo "================================================"
          echo "  CP2 DevSecOps - Scan Concluído"
          echo "================================================"
          echo "Repositório: ${{ github.repository }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Commit:      ${{ github.sha }}"
          echo "Run #:       ${{ github.run_number }}"
          echo ""
          echo "Relatório disponível na aba 'Artifacts' deste workflow."
          echo "================================================"
